<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة الديون والتحصيل | النسخة الاحترافية</title>
    
    <!-- الخطوط والأيقونات -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#2563eb',
                            soft: 'rgba(37, 99, 235, 0.1)',
                        },
                        surface: 'var(--surface)',
                        background: 'var(--background)',
                        border: 'var(--border)',
                        text: {
                            DEFAULT: 'var(--text-main)',
                            dim: 'var(--text-dim)',
                        },
                        success: {
                            DEFAULT: '#10b981',
                            soft: 'rgba(16, 185, 129, 0.1)',
                        },
                        danger: {
                            DEFAULT: '#ef4444',
                            soft: 'rgba(239, 68, 68, 0.1)',
                        },
                        warning: {
                            DEFAULT: '#f59e0b',
                            soft: 'rgba(245, 158, 11, 0.1)',
                        },
                        overlay: 'rgba(0, 0, 0, 0.5)',
                    },
                    fontFamily: {
                        sans: ['Tajawal', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --background: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text-main: #0f172a;
            --text-dim: #64748b;
        }
        .dark {
            --background: #020617;
            --surface: #0f172a;
            --border: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            transition: background-color 0.3s ease;
        }
        .card-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
            #print-content { display: block !important; padding: 0 !important; }
        }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // إعدادات Firebase
        const firebaseConfig = {
            projectId: "sunlit-segment-470307-f7",
            appId: "1:959418264422:web:4343a18641c476838bb6a7",
            apiKey: "AIzaSyB_tprVFg33vOgg2l0941_cil7glyqYYRk",
            authDomain: "sunlit-segment-470307-f7.firebaseapp.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        // مكونات الأيقونات (Lucide)
        const Icon = ({ name, className }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [isAuthorized, setIsAuthorized] = useState(false);
            const [loading, setLoading] = useState(true);
            const [clients, setClients] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [isDarkMode, setIsDarkMode] = useState(localStorage.getItem('theme') === 'dark');

            // مراقبة حالة الدخول
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        // هنا يمكنك إضافة التحقق من القائمة البيضاء إذا أردت
                        setUser(u);
                        setIsAuthorized(true);
                    } else {
                        setUser(null);
                        setIsAuthorized(false);
                    }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // جلب البيانات
            useEffect(() => {
                if (!isAuthorized) return;
                const unsub = db.collection('clients').orderBy('name').onSnapshot(snap => {
                    setClients(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                return () => unsub();
            }, [isAuthorized]);

            // تبديل الوضع الليلي
            useEffect(() => {
                if (isDarkMode) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            }, [isDarkMode]);

            if (loading) return (
                <div className="flex items-center justify-center h-screen bg-background text-brand">
                    <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-brand"></div>
                </div>
            );

            if (!isAuthorized) return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-background">
                    <div className="bg-surface p-8 rounded-[40px] card-shadow w-full max-w-md text-center border border-border">
                        <h1 className="text-2xl font-black mb-8">نظام إدارة الديون</h1>
                        <button 
                            onClick={() => auth.signInWithPopup(googleProvider)}
                            className="w-full bg-brand text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-3 shadow-lg shadow-brand/20"
                        >
                            <Icon name="log-in" className="w-5 h-5" /> دخول بحساب جوجل
                        </button>
                    </div>
                </div>
            );

            const filteredClients = clients.filter(c => c.name.toLowerCase().includes(searchTerm.toLowerCase()));
            const totalDebt = clients.reduce((acc, c) => acc + ((c.total || 0) - (c.paid || 0)), 0);

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-surface border-b border-border sticky top-0 z-40 px-6 py-4">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <h1 className="text-xl font-black">إدارة الديون</h1>
                            <div className="flex items-center gap-3">
                                <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 hover:bg-brand/10 rounded-xl">
                                    <Icon name={isDarkMode ? "sun" : "moon"} className="w-5 h-5" />
                                </button>
                                <button onClick={() => auth.signOut()} className="p-2 text-danger hover:bg-danger-soft rounded-xl">
                                    <Icon name="log-out" className="w-5 h-5" />
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto p-6 space-y-8">
                        {/* الإحصائيات */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div className="bg-surface p-6 rounded-3xl card-shadow border border-border">
                                <p className="text-text-dim text-sm font-bold mb-2">إجمالي الديون</p>
                                <h2 className="text-3xl font-black text-brand">{totalDebt.toLocaleString()} ج.م</h2>
                            </div>
                            <div className="bg-surface p-6 rounded-3xl card-shadow border border-border">
                                <p className="text-text-dim text-sm font-bold mb-2">عدد العملاء</p>
                                <h2 className="text-3xl font-black">{clients.length}</h2>
                            </div>
                        </div>

                        {/* البحث والإضافة */}
                        <div className="flex flex-col sm:flex-row gap-4 items-center justify-between bg-surface p-4 rounded-3xl border border-border">
                            <input 
                                placeholder="ابحث عن عميل..." 
                                value={searchTerm} 
                                onChange={e => setSearchTerm(e.target.value)}
                                className="w-full sm:max-w-md bg-background p-4 rounded-2xl outline-none border border-transparent focus:border-brand"
                            />
                            <button className="w-full sm:w-auto bg-brand text-white px-8 py-4 rounded-2xl font-bold shadow-lg shadow-brand/20">
                                إضافة عميل +
                            </button>
                        </div>

                        {/* قائمة العملاء */}
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                            {filteredClients.map(c => (
                                <div key={c.id} className="bg-surface p-6 rounded-3xl card-shadow border border-border hover:border-brand/30 transition-all">
                                    <h3 className="text-xl font-black mb-4">{c.name}</h3>
                                    <p className="text-text-dim text-xs font-bold mb-1">المبلغ المتبقي</p>
                                    <div className="text-3xl font-black text-brand mb-6">
                                        {((c.total || 0) - (c.paid || 0)).toLocaleString()} ج.م
                                    </div>
                                    <div className="flex gap-2">
                                        <button className="flex-1 bg-success text-white py-3 rounded-xl font-bold text-sm">تحصيل</button>
                                        <button className="flex-1 bg-brand-soft text-brand py-3 rounded-xl font-bold text-sm">تفاصيل</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
